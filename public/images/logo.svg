<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" width="320" height="56">
  <!-- icon badge — stroke keeps it visible in dark mode -->
  <rect x="0" y="0" width="56" height="56" rx="12" fill="#11151C" stroke="#C5780A" stroke-width="1.5"/>
  <!-- corner brackets -->
  <rect x="10" y="10" width="13" height="3.5" fill="#C5780A"/>
  <rect x="10" y="10" width="3.5" height="13" fill="#C5780A"/>
  <rect x="33" y="10" width="13" height="3.5" fill="#C5780A"/>
  <rect x="42.5" y="10" width="3.5" height="13" fill="#C5780A"/>
  <rect x="10" y="42.5" width="13" height="3.5" fill="#C5780A"/>
  <rect x="10" y="33"  width="3.5" height="13" fill="#C5780A"/>
  <rect x="33" y="42.5" width="13" height="3.5" fill="#C5780A"/>
  <rect x="42.5" y="33" width="3.5" height="13" fill="#C5780A"/>
  <!-- top-left finder -->
  <rect x="15" y="15" width="13" height="13" rx="2" fill="#FFB454"/>
  <rect x="17" y="17" width="9"  height="9"  rx="1" fill="#11151C"/>
  <rect x="19" y="19" width="5"  height="5"        fill="#FFB454"/>
  <!-- top-right finder -->
  <rect x="28" y="15" width="13" height="13" rx="2" fill="#FFB454"/>
  <rect x="30" y="17" width="9"  height="9"  rx="1" fill="#11151C"/>
  <rect x="32" y="19" width="5"  height="5"        fill="#FFB454"/>
  <!-- bottom-left finder -->
  <rect x="15" y="28" width="13" height="13" rx="2" fill="#FFB454"/>
  <rect x="17" y="30" width="9"  height="9"  rx="1" fill="#11151C"/>
  <rect x="19" y="32" width="5"  height="5"        fill="#FFB454"/>
  <!-- data dots -->
  <rect x="28" y="28" width="5" height="5" rx="0.5" fill="#FFB454"/>
  <rect x="35" y="35" width="5" height="5" rx="0.5" fill="#FFB454"/>
  <rect x="42" y="28" width="5" height="5" rx="0.5" fill="#FFB454"/>
  <rect x="28" y="35" width="5" height="5" rx="0.5" fill="#FFB454" opacity="0"/>
  <rect x="42" y="35" width="5" height="5" rx="0.5" fill="#FFB454"/>
  <!-- wordmark: currentColor = dark on light bg, white in dark mode (via CSS filter) -->
  <text
    x="68" y="36"
    font-family="Cambria, Georgia, serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="currentColor"
  >QR Keepers</text>
</svg>
